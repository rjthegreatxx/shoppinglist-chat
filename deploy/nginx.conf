# HTTP — serves acme.sh challenge, redirects everything else to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name YOUR_DOMAIN;

    root /var/www/YOUR_DOMAIN;

    location /.well-known/acme-challenge/ {
        root /var/www/YOUR_DOMAIN;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — proxy to FastAPI
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name YOUR_DOMAIN;

    ssl_certificate /etc/letsencrypt/YOUR_DOMAIN/fullchain.cer;
    ssl_certificate_key /etc/letsencrypt/YOUR_DOMAIN/YOUR_DOMAIN.key;
    include /etc/nginx/snippets/ssl-params.conf;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;

        # Required for streaming responses
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 120s;
    }
}
